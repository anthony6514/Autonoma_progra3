<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca Web</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">

    <header>
      <h1>📚 Biblioteca Web</h1>
      <p>Aplicación de gestión de libros, autores y categorías.</p>
    </header>

    <!-- TARJETAS DE ACCESO -->
    <div class="cards">
      <a class="card" href="http://localhost:8080/autores">
        <span class="icon">✍️</span>
        <h2>Autores</h2>
        <p>Ver, crear, editar y eliminar autores.</p>
      </a>
      <a class="card" href="http://localhost:8080/libros">
        <span class="icon">📖</span>
        <h2>Libros</h2>
        <p>Ver, crear, editar y eliminar libros.</p>
      </a>
      <a class="card" href="http://localhost:8080/categorias">
        <span class="icon">🏷️</span>
        <h2>Categorías</h2>
        <p>Ver, crear, editar y eliminar categorías.</p>
      </a>
    </div>



  </div>

</body>
</html>
