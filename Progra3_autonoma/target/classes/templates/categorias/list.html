<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Categorías</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1>Categorías</h1>
    <a class="btn btn-success mb-3" href="/categorias/nuevo">Nueva categoría</a>
    <a class="btn btn-secondary mb-3" href="/">Inicio</a>
    <table class="table table-bordered bg-white">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Libros</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.name}"></td>
                <td th:text="${category.description}"></td>
                <td th:text="${category.books.size()}"></td>
                <td>
                    <a class="btn btn-primary btn-sm" th:href="@{'/categorias/editar/' + ${category.id}}">Editar</a>
                    <form th:action="@{'/categorias/eliminar/' + ${category.id}}" method="post" style="display:inline">
                        <button class="btn btn-danger btn-sm" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
