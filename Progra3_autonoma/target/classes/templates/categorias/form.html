<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Nueva categoría</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 th:text="${category.id} != null ? 'Editar categoría' : 'Nueva categoría'"></h1>
    <form th:action="@{/categorias/guardar}" th:object="${category}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" type="text" th:field="*{name}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" href="/categorias">Cancelar</a>
    </form>
</div>
</body>
</html>
