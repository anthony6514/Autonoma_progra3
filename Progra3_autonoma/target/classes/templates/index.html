<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Biblioteca</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Biblioteca</h1>
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Autores</h3>
                <p th:text="${authorCount}"></p>
                <a class="btn btn-primary" href="/autores">Ver autores</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Libros</h3>
                <p th:text="${bookCount}"></p>
                <a class="btn btn-primary" href="/libros">Ver libros</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Categorías</h3>
                <p th:text="${categoryCount}"></p>
                <a class="btn btn-primary" href="/categorias">Ver categorías</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
