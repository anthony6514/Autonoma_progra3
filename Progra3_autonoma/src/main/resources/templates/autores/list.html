<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Autores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1>Autores</h1>
    <a class="btn btn-success mb-3" href="/autores/nuevo">Nuevo autor</a>
    <a class="btn btn-secondary mb-3" href="/">Inicio</a>
    <table class="table table-bordered bg-white">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Perfil</th>
                <th>Libros</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="author : ${authors}">
                <td th:text="${author.name}"></td>
                <td th:text="${author.email}"></td>
                <td th:text="${author.profile != null ? author.profile.biography : 'Sin perfil'}"></td>
                <td th:text="${author.books.size()}"></td>
                <td>
                    <a class="btn btn-primary btn-sm" th:href="@{'/autores/editar/' + ${author.id}}">Editar</a>
                    <form th:action="@{'/autores/eliminar/' + ${author.id}}" method="post" style="display:inline">
                        <button class="btn btn-danger btn-sm" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
