<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Nuevo autor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 th:text="${author.id} != null ? 'Editar autor' : 'Nuevo autor'"></h1>
    <form th:action="@{/autores/guardar}" th:object="${author}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" type="text" th:field="*{name}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" th:field="*{email}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Biografía</label>
            <textarea class="form-control" name="bio" th:text="${author.profile != null ? author.profile.biography : ''}"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Sitio web</label>
            <input class="form-control" type="text" name="website" th:value="${author.profile != null ? author.profile.website : ''}" />
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" href="/autores">Cancelar</a>
    </form>
</div>
</body>
</html>
